# HTTP → HTTPS redirect + ACME-Challenge für Certbot
server {
    listen 80;
    server_name 152-53-139-254.sslip.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name 152-53-139-254.sslip.io;

    ssl_certificate     /etc/letsencrypt/live/152-53-139-254.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/152-53-139-254.sslip.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # REST + Health
    location / {
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # WebSocket — braucht Upgrade-Header + langen Timeout
    location /ws/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400s;
    }
}
